<!DOCTYPE html>

    <title>Career Conversation AI</title>
    <style>
        /* Force full height and prevent mobile bounce breaking the canvas */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #f9fafb;
            /* Webkit fix for older iOS Safari engines */
            -webkit-overflow-scrolling: touch; 
        }
        
        /* The container wrapper forces Safari to respect absolute boundary layers */
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="app-container" id="wrapper">
        </div>
